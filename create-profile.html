<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Profile - SkillSwap</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="stylesheet/style.css" />
    <link rel="stylesheet" href="stylesheet/create-profile.css" />
  </head>
  <body>
    <button
      class="theme-toggle theme-toggle-fixed"
      aria-label="Toggle dark mode"
    >
      <span class="material-symbols-outlined icon-dark" aria-hidden="true"
        >dark_mode</span
      >
      <span class="material-symbols-outlined icon-light" aria-hidden="true"
        >light_mode</span
      >
    </button>

    <div class="create-profile-container">
      <div class="create-profile-header">
        <h1>Let's finish your profile</h1>
        <p>
          Tell us a bit about yourself so we can match you with the right peers.
        </p>
      </div>

      <form class="create-profile-form" id="profile-form">
        <div class="form-group photo-upload-group">
          <label
            >Profile Photo <span class="optional-label">(optional)</span></label
          >
          <div class="photo-preview-wrapper">
            <div class="photo-preview" id="photo-preview">
              <span class="material-symbols-outlined" aria-hidden="true"
                >person</span
              >
            </div>
            <div class="photo-upload-actions">
              <button
                type="button"
                class="btn-choose-photo"
                id="btn-choose-photo"
              >
                <span class="material-symbols-outlined" aria-hidden="true"
                  >upload</span
                >
                Choose Photo
              </button>
              <p class="photo-hint">JPG, PNG or GIF &middot; Max 2MB</p>
            </div>
          </div>
          <input
            type="file"
            id="profile-photo-input"
            class="visually-hidden-input"
            accept="image/*"
          />
        </div>

        <div class="form-group">
          <label>School / University</label>
          <input
            type="text"
            id="school-input"
            placeholder="e.g. Stanford University"
          />
        </div>

        <div class="form-group">
          <label>Degree / Program</label>
          <input
            type="text"
            id="degree-input"
            placeholder="e.g. B.S. Computer Science"
          />
        </div>

        <div class="form-group">
          <label>Skills I have (to teach)</label>
          <div class="tags-input-wrapper" id="teach-tags-wrapper">
            <input
              type="text"
              class="tag-input"
              placeholder="Type and press enter..."
            />
          </div>
        </div>

        <div class="form-group">
          <label>Skills I want to learn</label>
          <div class="tags-input-wrapper" id="learn-tags-wrapper">
            <input
              type="text"
              class="tag-input"
              placeholder="Type and press enter..."
            />
          </div>
        </div>

        <p class="form-error" id="profile-error" aria-live="polite"></p>
        <button type="submit" class="btn-submit-profile">
          Complete Profile
        </button>
      </form>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
