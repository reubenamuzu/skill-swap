<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Profile - SkillExchange</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="stylesheet/style.css"/>
  <link rel="stylesheet" href="stylesheet/create-profile.css"/>
</head>
<body>

  <div class="create-profile-container">
    
    <div class="create-profile-header">
      <h1>Let's finish your profile</h1>
      <p>Tell us a bit about yourself so we can match you with the right peers.</p>
    </div>

    <form class="create-profile-form" action="dashboard.html" method="GET">
      
      <div class="form-group">
        <label>School / University</label>
        <input type="text" placeholder="e.g. Stanford University" required>
      </div>

      <div class="form-group">
        <label>Degree / Program</label>
        <input type="text" placeholder="e.g. B.S. Computer Science" required>
      </div>

      <div class="form-group">
        <label>Skills I have (to teach)</label>
        <div class="tags-input-wrapper">
          <div class="tag">HTML/CSS <span class="material-symbols-outlined">close</span></div>
          <div class="tag">JavaScript <span class="material-symbols-outlined">close</span></div>
          <input type="text" class="tag-input" placeholder="Type and press enter...">
        </div>
      </div>

      <div class="form-group">
        <label>Skills I want to learn</label>
        <div class="tags-input-wrapper">
          <div class="tag">Python <span class="material-symbols-outlined">close</span></div>
          <input type="text" class="tag-input" placeholder="Type and press enter...">
        </div>
      </div>

      <button type="submit" class="btn-submit-profile">Complete Profile</button>
      
    </form>

  </div>

</body>
</html>
