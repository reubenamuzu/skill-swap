<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password - SkillSwap</title>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../stylesheet/style.css" />
    <link rel="stylesheet" href="../stylesheet/auth.css" />
    <link rel="stylesheet" href="../stylesheet/edit-profile.css" />
  </head>

  <body>

    <div class="auth-topbar">
      <button class="auth-theme-toggle" aria-label="Toggle dark mode">
        <i class="fas fa-moon icon-dark"  aria-hidden="true"></i>
        <i class="fas fa-sun  icon-light" aria-hidden="true"></i>
      </button>
    </div>

    <div class="auth-page">
      <div class="auth-card">

        <a href="../index.html" class="auth-logo-link" aria-label="Go to SkillSwap home">
          <img src="../assets/image swip.png" alt="SkillSwap" class="auth-logo" />
        </a>

        <h1 class="auth-heading">Reset your password</h1>
        <p class="auth-subheading">
          Enter your email and choose a new password.
          <br>Remembered it? <a href="login.html">Log in</a>
        </p>

        <form id="forgot-password-form" novalidate>

          <div class="input-group">
            <label for="forgot-email" class="sr-only">Email address</label>
            <i class="fas fa-envelope" aria-hidden="true"></i>
            <input
              type="email"
              id="forgot-email"
              class="auth-input"
              placeholder="Email"
              autocomplete="email"
              required
            />
          </div>

          <div class="input-group">
            <label for="forgot-new-password" class="sr-only">New password</label>
            <i class="fas fa-lock" aria-hidden="true"></i>
            <input
              type="password"
              id="forgot-new-password"
              class="auth-input"
              placeholder="New password"
              autocomplete="new-password"
              required
            />
            <button type="button" class="password-toggle" aria-label="Show password" tabindex="-1">
              <i class="fas fa-eye" aria-hidden="true"></i>
            </button>
          </div>

          <div class="input-group">
            <label for="forgot-confirm-password" class="sr-only">Confirm new password</label>
            <i class="fas fa-lock" aria-hidden="true"></i>
            <input
              type="password"
              id="forgot-confirm-password"
              class="auth-input"
              placeholder="Confirm new password"
              autocomplete="new-password"
              required
            />
            <button type="button" class="password-toggle" aria-label="Show password" tabindex="-1">
              <i class="fas fa-eye" aria-hidden="true"></i>
            </button>
          </div>

          <p class="form-error" id="forgot-error" aria-live="polite" role="alert"></p>
          <p class="form-success" id="forgot-success" aria-live="polite"></p>

          <button type="submit" class="auth-submit-btn">Reset Password</button>

        </form>

      </div>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/script.js"></script>
  </body>
</html>
