<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Profile - SkillSwap</title>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../stylesheet/style.css" />
    <link rel="stylesheet" href="../stylesheet/auth.css" />
    <link rel="stylesheet" href="../stylesheet/create-profile.css" />
    <link rel="stylesheet" href="../stylesheet/edit-profile.css" />
  </head>

  <body>

    <!-- ── Top bar ────────────────────────────────────────────── -->
    <div class="auth-topbar edit-topbar">
      <a href="dashboard.html" class="edit-back-btn" aria-label="Back to dashboard">
        <span class="material-symbols-outlined" aria-hidden="true">arrow_back</span>
        Back to Dashboard
      </a>
      <button class="auth-theme-toggle" aria-label="Toggle dark mode">
        <i class="fas fa-moon icon-dark"  aria-hidden="true"></i>
        <i class="fas fa-sun  icon-light" aria-hidden="true"></i>
      </button>
    </div>

    <!-- ── Page wrapper ───────────────────────────────────────── -->
    <div class="auth-page profile-page">
      <div class="auth-card profile-card">

        <!-- Brand image -->
        <a href="../index.html" class="auth-logo-link" aria-label="Go to SkillSwap home">
          <img src="../assets/image swip.png" alt="SkillSwap" class="auth-logo" />
        </a>

        <!-- Heading -->
        <h1 class="auth-heading">Edit Profile</h1>
        <p class="auth-subheading">Update your details, skills, and photo.</p>

        <!-- Edit profile form -->
        <form id="edit-profile-form" novalidate>

          <!-- Photo upload -->
          <div class="form-group photo-upload-group">
            <label class="profile-label">
              Profile photo
              <span class="optional-label">(optional)</span>
            </label>
            <div class="photo-preview-wrapper">
              <div class="photo-preview" id="edit-photo-preview">
                <span class="material-symbols-outlined" aria-hidden="true">person</span>
              </div>
              <div class="photo-upload-actions">
                <button type="button" class="btn-choose-photo" id="edit-btn-choose-photo">
                  <span class="material-symbols-outlined" aria-hidden="true">upload</span>
                  Change photo
                </button>
                <p class="photo-hint">JPG, PNG or GIF &middot; Max 2MB</p>
              </div>
            </div>
            <input
              type="file"
              id="edit-photo-input"
              class="sr-only"
              accept="image/*"
            />
          </div>

          <!-- Full name -->
          <div class="form-group">
            <label for="edit-name" class="profile-label">
              Full name
              <span class="required-label">*</span>
            </label>
            <div class="profile-input-group">
              <i class="fas fa-user" aria-hidden="true"></i>
              <input
                type="text"
                id="edit-name"
                class="auth-input profile-input"
                placeholder="Your full name"
                autocomplete="name"
              />
            </div>
          </div>

          <!-- School -->
          <div class="form-group">
            <label for="edit-school" class="profile-label">
              School / University
              <span class="required-label">*</span>
            </label>
            <div class="profile-input-group">
              <i class="fas fa-graduation-cap" aria-hidden="true"></i>
              <input
                type="text"
                id="edit-school"
                class="auth-input profile-input"
                placeholder="e.g. Stanford University"
                autocomplete="organization"
              />
            </div>
          </div>

          <!-- Degree -->
          <div class="form-group">
            <label for="edit-degree" class="profile-label">
              Degree / Program
              <span class="required-label">*</span>
            </label>
            <div class="profile-input-group">
              <i class="fas fa-book" aria-hidden="true"></i>
              <input
                type="text"
                id="edit-degree"
                class="auth-input profile-input"
                placeholder="e.g. B.S. Computer Science"
              />
            </div>
          </div>

          <!-- Skills to teach -->
          <div class="form-group">
            <label class="profile-label">
              Skills I can teach
              <span class="required-label">*</span>
            </label>
            <div class="tags-input-wrapper" id="edit-teach-wrapper">
              <input
                type="text"
                class="tag-input"
                placeholder="Type a skill and press Enter..."
                aria-label="Add skills to teach"
              />
            </div>
            <p class="field-hint">Add at least one skill you can teach others.</p>
          </div>

          <!-- Skills to learn -->
          <div class="form-group">
            <label class="profile-label">
              Skills I want to learn
              <span class="optional-label">(optional)</span>
            </label>
            <div class="tags-input-wrapper" id="edit-learn-wrapper">
              <input
                type="text"
                class="tag-input"
                placeholder="Type a skill and press Enter..."
                aria-label="Add skills to learn"
              />
            </div>
          </div>

          <!-- Error -->
          <p class="form-error" id="edit-profile-error" aria-live="polite" role="alert"></p>

          <!-- Action buttons -->
          <div class="edit-action-row">
            <a href="dashboard.html" class="btn-cancel-edit">Cancel</a>
            <button type="submit" class="auth-submit-btn btn-save-edit">Save Changes</button>
          </div>

        </form>

      </div><!-- /auth-card.profile-card -->
    </div><!-- /auth-page -->

    <script src="../js/auth.js"></script>
    <script src="../js/script.js"></script>
  </body>
</html>
