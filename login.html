<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SkillExchange</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="stylesheet/auth.css">
</head>

<body>
  <div class="auth-container">
    <div class="auth-illustration">
      <img src="assets/login-icon.png" alt="Login Illustration">
    </div>
    <div class="auth-form-container">
      <div class="auth-form-box">
        <a href="index.html">
          <img src="assets/image swip.png" alt="SkillSwap" class="auth-logo">
        </a>
        <h1 class="auth-title">Login</h1>
        <form action="index.html" method="GET">

          <div class="form-group">
            <label class="form-label">Username</label>
            <div class="input-wrapper">
              <span class="material-symbols-outlined">mail</span>
              <input type="text" placeholder="Enter email address" required>
            </div>
          </div>

          <div class="form-group" style="margin-bottom: 2rem;">
            <label class="form-label">Password</label>
            <div class="input-wrapper">
              <span class="material-symbols-outlined">lock</span>
              <input type="password" placeholder="Enter Password" required>
              <span class="material-symbols-outlined"
                style="margin-right: 0; margin-left: 0.75rem; cursor: pointer;">visibility</span>
            </div>
          </div>

          <button type="submit" class="btn-submit">Login</button>

          <p class="auth-switch">
            Don't have an account? <a href="signup.html">Sign Up</a>
          </p>
        </form>
      </div>
    </div>
  </div>
</body>

</html>
