<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - SkillExchange</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="stylesheet/auth.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-illustration">
      <img src="assets/signup_illustration.png" alt="Sign Up Illustration">
    </div>
    <div class="auth-form-container">
      <div class="auth-form-box">
        <h1 class="auth-title">Create Your Account</h1>
        <form action="create-profile.html" method="GET">
          <div class="form-group">
            <label class="form-label">Full name</label>
            <div class="input-wrapper">
              <span class="material-symbols-outlined">person</span>
              <input type="text" placeholder="Enter full name" required>
            </div>
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Username</label>
              <div class="input-wrapper">
                <span class="material-symbols-outlined">person_outline</span>
                <input type="text" placeholder="Enter username" required>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Email</label>
              <div class="input-wrapper">
                <span class="material-symbols-outlined">mail</span>
                <input type="email" placeholder="Enter email address" required>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Password</label>
            <div class="input-wrapper">
              <span class="material-symbols-outlined">lock</span>
              <input type="password" placeholder="Enter password" required>
            </div>
          </div>

          <div class="terms-group">
            <input type="checkbox" id="terms" required>
            <label for="terms">I agree to the Terms of Service & Privacy Policy</label>
          </div>

          <button type="submit" class="btn-submit">Submit</button>

          <p class="auth-switch">
            Already have an account? <a href="login.html">Login</a>
          </p>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
